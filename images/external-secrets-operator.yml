cachito:
  packages:
    gomod:
      - path: .
content:
  source:
    dockerfile: Containerfile.art
    git:
      allow_unprotected_branch: true
      branch:
        target: release-1.1
      url: git@github.com:openshift-priv/external-secrets-operator.git
      url_pull: https://github.com/fbladilo/external-secrets-operator.git
      web: https://github.com/openshift/external-secrets-operator
distgit:
  component: external-secrets-operator-container
  branch: rhaos-{MAJOR}.{MINOR}-rhel-9
delivery:
  bundle_delivery_repo_name: external-secrets-operator/external-secrets-operator-bundle
  delivery_repo_names:
    - external-secrets-operator/external-secrets-operator-rhel9
for_payload: false
enabled_repos:
  - rhel-9-appstream-rpms
  - rhel-9-baseos-rpms
from:
  builder:
    - stream: rhel-9-golang
  member: base-rhel9
name: external-secrets-operator/external-secrets-operator-rhel9
owners:
  - tgeer@redhat.com
  - mykastur@redhat.com
  - bhb@redhat.com
  - sbhor@redhat.com
update-csv:
  bundle-dir: manifests/
  manifests-dir: bundle/
  registry: image-registry.openshift-image-registry.svc:5000
  valid-subscription-label: '["OpenShift Kubernetes Engine", "OpenShift Container Platform", "OpenShift Platform Plus"]'
jira:
  project: ESO
  component: External Secrets Operator
