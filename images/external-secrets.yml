cachito:
  packages:
    gomod:
      - path: .
content:
  source:
    dockerfile: Containerfile.art
    git:
      branch:
        target: release-1.1
      url: git@github.com:openshift-priv/external-secrets.git
      url_pull: https://github.com/fbladilo/external-secrets.git
      web: https://github.com/openshift/external-secrets
distgit:
  component: external-secrets-container
  branch: rhaos-{MAJOR}.{MINOR}-rhel-9
delivery:
  delivery_repo_names:
    - external-secrets-operator/external-secrets-rhel9
for_payload: false
enabled_repos:
  - rhel-9-appstream-rpms
  - rhel-9-baseos-rpms
from:
  builder:
    - stream: rhel-9-golang
  member: base-rhel9
name: external-secrets-operator/external-secrets-rhel9
owners:
  - tgeer@redhat.com
  - mykastur@redhat.com
  - bhb@redhat.com
  - sbhor@redhat.com
dependents:
  - external-secrets-operator
jira:
  project: ESO
  component: External Secrets Operator
